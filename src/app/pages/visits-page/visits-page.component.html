<div class="space-y-6">

  <h1 class="text-2xl font-bold text-gray-800">All Visits</h1>

  <!-- Search -->
  <input
    type="text"
    placeholder="Search by patient name..."
    [ngModel]="searchTerm()"
    (ngModelChange)="onSearch($event)"
    class="w-full max-w-md border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-teal-400" />

  <!-- Visits Table -->
  <div class="bg-white rounded-xl shadow overflow-x-auto">
    <table class="w-full text-left">
      <thead class="bg-gray-50 border-b border-gray-200">
        <tr>
          <th class="px-4 py-3 text-sm font-semibold text-gray-600">Date</th>
          <th class="px-4 py-3 text-sm font-semibold text-gray-600">Patient</th>
          <th class="px-4 py-3 text-sm font-semibold text-gray-600">Diagnosis</th>
          <th class="px-4 py-3 text-sm font-semibold text-gray-600 text-center">Procedures</th>
          <th class="px-4 py-3 text-sm font-semibold text-gray-600 text-right">Total Cost</th>
        </tr>
      </thead>
      <tbody>
        @for (visit of filteredVisits(); track visit.id) {
          <tr
            class="border-b border-gray-100 hover:bg-gray-50 cursor-pointer transition"
            (click)="openProfile(visit.patientId)"
            (keydown.enter)="openProfile(visit.patientId)"
            tabindex="0">
            <td class="px-4 py-3 text-sm text-gray-600">{{ visit.visitDate }}</td>
            <td class="px-4 py-3 text-sm font-medium text-gray-800">{{ visit.patientName }}</td>
            <td class="px-4 py-3 text-sm text-gray-600">{{ visit.diagnosis }}</td>
            <td class="px-4 py-3 text-sm text-center text-gray-500">{{ visit.procedures.length }}</td>
            <td class="px-4 py-3 text-sm text-right font-medium text-teal-700">{{ visitTotalCost(visit) }} EGP</td>
          </tr>
        } @empty {
          <tr>
            <td colspan="5" class="px-4 py-8 text-center text-gray-400">No visits found.</td>
          </tr>
        }
      </tbody>
    </table>
  </div>

</div>
